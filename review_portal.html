function normalizeRow(row, fileType) {
  const parcelId    = String(row["Parcel_ID"] || row["PARID"] || "").trim();
  const address     = String(row["Address"]   || "").trim();
  const city        = String(row["City"]      || "").trim();
  const zip         = String(row["Zip"]       || row["Postal Code"] || "").trim();
  const zone        = String(row["Zone"] || row["TAXDIST"] || "").trim();
  const listing     = String(row["Listing_Number"] || row["Listing #"] || "").trim();
  const salekey     = String(row["SALEKEY"]   || "").trim();
  const addlParcels = String(row["ADDITIONAL_PARCELS"] || "").trim();
  const zillowUrl   = String(row["Zillow_URL"]  || "").trim();
  const parcelUrl   = String(row["Parcel_URL"]  || "").trim();
  const yrblt       = row["YRBLT"]    ? Number(row["YRBLT"])    : null;
  const effyr       = row["EFFYR"]    ? Number(row["EFFYR"])    : null;
  const grade       = String(row["GRADE"] || "").trim();
  const cdu         = String(row["CDU"]   || "").trim().toUpperCase();
  const remarks     = String(row["Public_Remarks"] || "").trim();
  // ── NEW fields ──
  const fixbath     = row["FIXBATH"] !== "" && row["FIXBATH"] != null ? Number(row["FIXBATH"]) : null;
  const fixhalf     = row["FIXHALF"] !== "" && row["FIXHALF"] != null ? Number(row["FIXHALF"]) : null;
  const sfla        = row["SFLA"]    !== "" && row["SFLA"]    != null ? Number(row["SFLA"])    : null;

  const base = { parcelId, address, city, zip, zone, listing, salekey, addlParcels,
                 zillowUrl, parcelUrl, yrblt, effyr, grade, cdu, remarks,
                 fixbath, fixhalf, sfla };

  if (fileType === "mismatches") {
    return { ...base, type:"mismatch",
      fieldMls:   String(row["Field_MLS"]  || ""),
      fieldCama:  String(row["Field_CAMA"] || ""),
      mlsValue:   row["MLS_Value"]  ?? "",
      camaValue:  row["CAMA_Value"] ?? "",
      difference: String(row["Difference"] || ""),
    };
  }
  return { ...base, type:"perfect",
    fieldsCompared: String(row["Fields_Compared"] || ""),
    fieldsList:     String(row["Fields_List"] || ""),
  };
}

function groupByParcel(rows) {
  const map = new Map();
  for (const r of rows) {
    if (!map.has(r.parcelId)) map.set(r.parcelId, { ...r, mismatches:[] });
    if (r.type === "mismatch") {
      map.get(r.parcelId).mismatches.push({
        fieldMls:r.fieldMls, fieldCama:r.fieldCama,
        mlsValue:r.mlsValue, camaValue:r.camaValue, difference:r.difference,
      });
    }
  }
  return Array.from(map.values());
}

function buildZillowUrl(address, city, zip) {
  if (!address || !city) return "";
  const clean = s => s.trim().replace(/[^\w\s-]/g,"").replace(/\s+/g,"-");
  const zipClean = String(zip||"").split("-")[0].trim();
  return `https://www.zillow.com/homes/${clean(address)}-${clean(city)}-OH${zipClean?`-${zipClean}`:""}_rb/`;
}

    // Same windowName = reuses that window each click — perfect for dedicated monitors
    const features = 'width=1400,height=900,left=100,top=50,toolbar=yes,menubar=yes,scrollbars=yes,resizable=yes,location=yes,status=yes';
    window.open(href, windowName || label, features);
  };
  return (
    <a href={href} onClick={handleClick}
      style={{...base,border:`1.5px solid ${accentColor}44`,background:`${accentColor}0d`,color:accentColor,textDecoration:"none",cursor:"pointer"}}

      onMouseLeave={e=>{e.currentTarget.style.background=`${accentColor}0d`;e.currentTarget.style.borderColor=`${accentColor}44`;}}
    >{icon} {label}</a>
  );
}

function weekKeyToLabel(key) {
  // "2026-W10" → "Week of Mar 2, 2026"
  const [year, w] = key.split("-W");
  const jan4 = new Date(Date.UTC(Number(year), 0, 4));
  const weekNum = Number(w);
  const dayOfWeek = jan4.getUTCDay() || 7;
  const monday = new Date(jan4);
  monday.setUTCDate(jan4.getUTCDate() - (dayOfWeek - 1) + (weekNum - 1) * 7);
  return `Week of ${monday.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",timeZone:"UTC"})}`;
}

function App() {

  // sessions: { [weekKey]: { label, mismatches, perfects, statuses, windowId, createdAt } }
  const [sessions,     setSessions]     = useState({});
  const [activeWeek,   setActiveWeek]   = useState(null); // weekKey of session being uploaded to

  // ── Current upload state (before saving into a session) ───────────────────
  const [mismatches,   setMismatches]   = useState([]);
  const [perfects,     setPerfects]     = useState([]);
  const [photoMap,     setPhotoMap]     = useState(new Map());
  const [windowId,     setWindowId]     = useState("638981240146803746");

  // ── Portal view state ─────────────────────────────────────────────────────
  const [portalWeek,   setPortalWeek]   = useState(null); // which week is open in portal
  const [statuses,     setStatuses]     = useState({});
  const [portalPhotos, setPortalPhotos] = useState(new Map());
  const [zoneFilter,   setZoneFilter]   = useState("All");
  const [cduFilter,    setCduFilter]    = useState("All");
  const [statusFilter, setStatusFilter] = useState("All");
  const [typeFilter,   setTypeFilter]   = useState("All");
  const [search,       setSearch]       = useState("");
  const [page,         setPage]         = useState(0);
  const [view,         setView]         = useState("home");
  const PAGE_SIZE = 15;

  // ── Derive current week key ───────────────────────────────────────────────
  const currentWeekKey = useMemo(() => getISOWeekKey(), []);

  // ── When user opens portal for a week, load that session's statuses ───────
  const openPortal = useCallback((weekKey) => {
    const sess = sessions[weekKey];
    if (!sess) return;
    setPortalWeek(weekKey);
    setStatuses(sess.statuses || {});
    setPortalPhotos(photoMap); // photos stay in memory from upload step
    setView("portal");
    setPage(0);
  }, [sessions, photoMap]);

  // ── Save status changes back into the session ─────────────────────────────
  const setStatus = useCallback((parcelId, status) => {
    setStatuses(prev => {
      const next = status === null
        ? (()=>{const n={...prev};delete n[parcelId];return n;})()
        : {...prev,[parcelId]:status};
      // Persist into session
      if (portalWeek) {
        setSessions(s => ({...s,[portalWeek]:{...s[portalWeek],statuses:next}}));
      }
      return next;
    });
  }, [portalWeek]);

  // ── Save session when user clicks "Open Review Portal" ───────────────────
  const saveAndOpenPortal = useCallback(() => {
    const weekKey = activeWeek || currentWeekKey;
    const now = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    const sess = {
      mismatches,
      perfects,
      statuses: sessions[weekKey]?.statuses || {}, // preserve existing statuses if re-uploading same week
      windowId,
      createdAt: now,
    };
    setSessions(s => ({...s,[weekKey]:sess}));
    setActiveWeek(weekKey);
    openPortal(weekKey); // this sets statuses from sess, then opens
    // directly set statuses from preserved statuses
    setStatuses(sess.statuses);
    setPortalWeek(weekKey);
    setPortalPhotos(photoMap);
    setView("portal");
    setPage(0);
  }, [activeWeek, currentWeekKey, mismatches, perfects, sessions, windowId, photoMap, openPortal]);

  // ── Start a new blank week ────────────────────────────────────────────────
  const startNewWeek = useCallback(() => {
    setMismatches([]);
    setPerfects([]);
    setPhotoMap(new Map());
    setActiveWeek(null);
  }, []);

  const loadFile = useCallback((file, fileType, setter) => {
    const reader = new FileReader();
    reader.onload = e => { setter(groupByParcel(parseXlsx(new Uint8Array(e.target.result)).map(r=>normalizeRow(r,fileType)))); };
    reader.readAsArrayBuffer(file);
  }, []);

  // ── Portal data comes from the open session ───────────────────────────────

  const portalMismatches = portalSession?.mismatches || [];
  const portalPerfects   = portalSession?.perfects   || [];

  const allParcels = useMemo(() => {
    const map = new Map();
    for (const p of portalPerfects)   map.set(p.parcelId, p);
    for (const p of portalMismatches) map.set(p.parcelId, p);
    return Array.from(map.values());
  }, [portalMismatches, portalPerfects]);

  // home-screen parcel count (current upload)
  const allParcelsHome = useMemo(() => {
    const map = new Map();
    for (const p of perfects)   map.set(p.parcelId, p);
    for (const p of mismatches) map.set(p.parcelId, p);
    return Array.from(map.values());

  const zones = useMemo(() => {
    const seen = new Set();
    for (const p of allParcels) if (p.zone && p.zone!=="nan" && p.zone!=="") seen.add(p.zone);
    return ["All", ...Array.from(seen).sort()];
  }, [allParcels]);

  const filtered = useMemo(() => {
    let arr = allParcels;
    if (zoneFilter!=="All")          arr = arr.filter(p=>p.zone===zoneFilter);
    if (cduFilter!=="All")           arr = arr.filter(p=>p.cdu===cduFilter);
    if (typeFilter!=="All")          arr = arr.filter(p=>typeFilter==="Mismatches"?p.type==="mismatch":p.type==="perfect");
    if (statusFilter==="Unreviewed") arr = arr.filter(p=>!statuses[p.parcelId]);
    else if (statusFilter!=="All")   arr = arr.filter(p=>statuses[p.parcelId]===statusFilter);
    if (search.trim()) {

      arr = arr.filter(p=>p.parcelId.toLowerCase().includes(q)||p.address.toLowerCase().includes(q)||p.listing.toLowerCase().includes(q));
    }
    return arr;
  }, [allParcels, zoneFilter, cduFilter, typeFilter, statusFilter, search, statuses]);

  const paginated  = useMemo(()=>filtered.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE),[filtered,page]);
  const totalPages = Math.ceil(filtered.length/PAGE_SIZE);

  const exportXlsx = useCallback(() => {
    const rows = allParcels.map(p => {
      const suggestions = getAllCduSuggestions(p.yrblt) || {};

        Sugg_FR:suggestions["FR"]??"", Sugg_PR:suggestions["PR"]??"",
        Status:statuses[p.parcelId]||"",
      };
    });
    const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Review");
    XLSX.writeFile(wb,`review_status_${portalWeek||new Date().toISOString().slice(0,10)}.xlsx`);
  }, [allParcels, statuses, portalWeek]);

  const counts = useMemo(()=>({
    unreviewed: allParcels.length-Object.keys(statuses).length,
    reviewed:   Object.values(statuses).filter(s=>s==="Reviewed").length,
    fieldVisit: Object.values(statuses).filter(s=>s==="Field Visit").length,
    flagged:    Object.values(statuses).filter(s=>s==="Flagged").length,
  }),[allParcels,statuses]);

  // ── Read API key status from context ────────────────────────────────────
  const currentApiKey = React.useContext(ApiKeyContext);
  const apiKeyReady = !!currentApiKey && currentApiKey.trim().length > 0;

  // ── Auto-load PRELOADED_DATA on mount ────────────────────────────────────
  useEffect(() => {
    if (!PRELOADED) return;
    const mm = groupByParcel((PRELOADED.mismatchRows||[]).map(r=>normalizeRow(r,"mismatches")));
    const pm = groupByParcel((PRELOADED.perfectRows||[]).map(r=>normalizeRow(r,"perfect")));
    setMismatches(mm);
    setPerfects(pm);
    // Load photo map from pre-baked base64 strings
    if (PRELOADED.photoMap && Object.keys(PRELOADED.photoMap).length > 0) {
      setPhotoMap(new Map(Object.entries(PRELOADED.photoMap)));
    }
  }, []);

  // ── HOME ──────────────────────────────────────────────────────────────────
  if (view==="home") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%)",fontFamily:"'DM Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600;700&family=Syne:wght@700;800&display=swap');*{box-sizing:border-box;}`}</style>

      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:12,letterSpacing:"0.2em",color:"#7dd3fc",fontFamily:"'DM Mono',monospace",marginBottom:12,textTransform:"uppercase"}}>STARK COUNTY AUDITOR'S OFFICE · PROPERTY ASSESSMENT</div>
        <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:"clamp(28px,5vw,44px)",color:"#f8fafc",fontWeight:800,margin:0,letterSpacing:"-0.02em",lineHeight:1.1}}>
          MLS / CAMA<br/><span style={{color:"#38bdf8"}}>Staff Review Portal</span>
        </h1>
      </div>

      {/* Previous weeks */}
      {Object.keys(sessions).length > 0 && (
        <WeekSelectorPanel
          sessions={sessions}
          activeWeek={portalWeek}
          onSelect={wk => { openPortal(wk); }}
          onNewWeek={startNewWeek}
        />
      )}

      {/* Pre-loaded data banner OR new week upload label */}
      {PRELOADED && allParcelsHome.length > 0 ? (
        <div style={{width:"100%",maxWidth:600,marginBottom:10,background:"#052e16",border:"1px solid #166534",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,color:"#4ade80",fontFamily:"'DM Mono',monospace",fontWeight:700,letterSpacing:"0.06em",marginBottom:2}}>
              ✓ DATA PRE-LOADED BY ADMIN
            </div>
            <div style={{fontSize:10,color:"#166534",fontFamily:"'DM Mono',monospace"}}>
              {PRELOADED.weekLabel} · Generated {PRELOADED.generatedAt}
            </div>
          </div>
          <div style={{fontSize:10,color:"#4ade80",fontFamily:"'DM Mono',monospace",textAlign:"right"}}>
            {allParcelsHome.length} parcels<br/>
            {photoMap.size > 0 ? `${photoMap.size} photos` : "no photos"}
          </div>
        </div>
      ) : (
        <div style={{width:"100%",maxWidth:600,marginBottom:10}}>
          <div style={{fontSize:11,color:"#7dd3fc",fontFamily:"'DM Mono',monospace",letterSpacing:"0.08em",marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
            <span style={{background:"#2563eb",color:"#fff",borderRadius:4,padding:"1px 7px",fontWeight:700}}>NEW</span>
            {weekKeyToLabel(activeWeek || currentWeekKey).toUpperCase()}
            {activeWeek && sessions[activeWeek] && (
              <span style={{color:"#fbbf24",fontSize:10}}>⚠ Re-uploading will keep existing review statuses</span>
            )}
          </div>
        </div>
      )}

      {/* WindowId */}
      <div style={{width:"100%",maxWidth:600,marginBottom:10,background:"#1e293b",borderRadius:12,padding:"12px 16px",border:"1px solid #334155"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:11,color:"#7dd3fc",fontFamily:"'DM Mono',monospace",letterSpacing:"0.08em"}}>IASWORLD WINDOW ID</span>
          <IasWorldHelp/>
        </div>
        <input value={windowId} onChange={e=>setWindowId(e.target.value)} placeholder="e.g. 638981240146803746"
          style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #334155",background:"#0f172a",color:"#f8fafc",fontFamily:"'DM Mono',monospace",fontSize:12,outline:"none"}}/>
        <div style={{fontSize:10,color:"#475569",marginTop:4}}>Paste your windowId above — click ❓ for instructions</div>
      </div>

      {/* Uploads: 3 columns — hidden when pre-loaded data is present */}
      {!PRELOADED && <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,width:"100%",maxWidth:600,marginBottom:20}}>
        {[["STEP 1","VALUE MISMATCHES","mismatches",setMismatches,mismatches.length],
          ["STEP 2","PERFECT MATCHES","perfect",setPerfects,perfects.length]].map(([step,label,type,setter,count])=>(
          <div key={step} style={{background:"#1e293b",borderRadius:14,padding:14,border:"1px solid #334155"}}>
            <div style={{fontSize:11,color:"#7dd3fc",fontFamily:"'DM Mono',monospace",marginBottom:8,letterSpacing:"0.08em"}}>{step}</div>
            <DropZone label={label} loaded={count>0} count={count} onFile={f=>loadFile(f,type,setter)}/>
          </div>
        ))}
        <div style={{background:"#1e293b",borderRadius:14,padding:14,border:"1px solid #334155"}}>
          <div style={{fontSize:11,color:"#a78bfa",fontFamily:"'DM Mono',monospace",marginBottom:8,letterSpacing:"0.08em"}}>STEP 3 <span style={{color:"#475569"}}>(optional)</span></div>
          <PhotoFolderUpload photoMap={photoMap} onPhotosLoaded={setPhotoMap}/>
        </div>
      </div>}

      {allParcelsHome.length>0&&(
        <div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center",marginBottom:20}}>
          {[["Total",allParcelsHome.length,"#38bdf8"],["Mismatches",mismatches.length,"#f87171"],["Perfect",perfects.length,"#4ade80"],["Photos",photoMap.size,"#a78bfa"]].map(([label,val,color])=>(
            <div key={label} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:99,padding:"7px 16px",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18,fontWeight:800,color,fontFamily:"'DM Mono',monospace"}}>{val}</span>
              <span style={{fontSize:11,color:"#94a3b8",letterSpacing:"0.04em"}}>{label.toUpperCase()}</span>
            </div>
          ))}
        </div>
      )}

      {/* API Key warning — shown when data is loaded but no key set */}
      {allParcelsHome.length > 0 && !apiKeyReady && (
        <div style={{width:"100%",maxWidth:600,marginBottom:14,background:"#1c1208",border:"2px solid #d97706",borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"flex-start",gap:12}}>
          <span style={{fontSize:24,flexShrink:0}}>🔑</span>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",fontFamily:"'DM Mono',monospace",letterSpacing:"0.06em",marginBottom:4}}>
              SET API KEY BEFORE ENTERING PORTAL
            </div>
            <div style={{fontSize:12,color:"#92400e",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6}}>
              AI Grade &amp; Condition suggestions will <strong style={{color:"#fbbf24"}}>not work</strong> once inside the portal unless you set the key here first.<br/>
              Click the <strong style={{color:"#fbbf24"}}>⚙️ button</strong> in the bottom-right corner → paste your Anthropic API key → click Save Key.
            </div>
          </div>
        </div>
      )}
      {allParcelsHome.length > 0 && apiKeyReady && (
        <div style={{width:"100%",maxWidth:600,marginBottom:14,background:"#052e16",border:"1px solid #166534",borderRadius:10,padding:"10px 16px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>🔑</span>
          <span style={{fontSize:12,color:"#4ade80",fontFamily:"'DM Mono',monospace",fontWeight:700}}>✓ API KEY SET — AI suggestions ready</span>
        </div>
      )}

      <button disabled={allParcelsHome.length===0} onClick={saveAndOpenPortal}
        style={{background:allParcelsHome.length>0?"linear-gradient(135deg,#2563eb,#0ea5e9)":"#334155",color:allParcelsHome.length>0?"#fff":"#64748b",border:"none",borderRadius:12,padding:"14px 40px",fontSize:15,fontWeight:700,cursor:allParcelsHome.length>0?"pointer":"not-allowed",fontFamily:"'Syne',sans-serif",letterSpacing:"0.04em",boxShadow:allParcelsHome.length>0?"0 4px 20px #2563eb55":"none",transition:"all 0.2s"}}>
        {allParcelsHome.length>0?"Open Review Portal →":"Upload files to continue"}
      </button>
    </div>
  );

  // ── PORTAL ────────────────────────────────────────────────────────────────
  const portalWId = portalSession?.windowId || windowId;

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9",fontFamily:"'DM Sans',sans-serif"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600;700&family=Syne:wght@700;800&display=swap');*{box-sizing:border-box;}::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#f1f5f9;}::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px;}`}</style>

      {/* Top bar */}
      <div style={{background:"#0f172a",padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52,position:"sticky",top:0,zIndex:100,borderBottom:"1px solid #1e293b"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
          <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:"#7dd3fc",cursor:"pointer",fontSize:13,fontFamily:"'DM Mono',monospace",padding:"4px 8px",borderRadius:6,flexShrink:0}}>← Back</button>
          <span style={{fontFamily:"'Syne',sans-serif",color:"#f8fafc",fontSize:14,fontWeight:800,letterSpacing:"-0.01em",whiteSpace:"nowrap"}}>MLS/CAMA Review</span>
          {/* Week switcher */}
          {Object.keys(sessions).length > 1 && (
            <select value={portalWeek||""} onChange={e=>{ if(e.target.value) { openPortal(e.target.value); setPage(0); } }}
              style={{padding:"3px 8px",borderRadius:6,border:"1px solid #334155",background:"#1e293b",color:"#7dd3fc",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer",outline:"none",maxWidth:180}}>
              {Object.keys(sessions).sort().reverse().map(k=>(
                <option key={k} value={k}>{weekKeyToLabel(k)}</option>
              ))}
            </select>
          )}
          {Object.keys(sessions).length === 1 && portalWeek && (
            <span style={{fontSize:11,color:"#38bdf8",fontFamily:"'DM Mono',monospace",background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"3px 8px"}}>{weekKeyToLabel(portalWeek)}</span>
          )}
          {portalPhotos.size>0&&<span style={{fontSize:10,background:"#7c3aed22",border:"1px solid #7c3aed66",color:"#a78bfa",borderRadius:4,padding:"2px 6px",fontFamily:"'DM Mono',monospace",fontWeight:700,flexShrink:0}}>🖼 {portalPhotos.size}</span>}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
          {[["UNR",counts.unreviewed,"#94a3b8","Unreviewed"],["REV",counts.reviewed,"#4ade80","Reviewed"],["FLD",counts.fieldVisit,"#60a5fa","Field Visit"],["FLG",counts.flagged,"#fbbf24","Flagged"]].map(([abbr,val,color,title])=>(
            <div key={abbr} title={title} style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:"#94a3b8",display:"flex",alignItems:"center",gap:2}}>
              <span style={{color,fontWeight:700,fontSize:13}}>{val}</span>
              <span style={{fontSize:9,color:"#475569"}}>{abbr}</span>
            </div>
          ))}
          <button onClick={exportXlsx} style={{marginLeft:4,background:"#1e293b",border:"1px solid #334155",color:"#7dd3fc",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'DM Mono',monospace",letterSpacing:"0.04em"}}>↓ Export</button>
        </div>
      </div>

      {/* Filter bar */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"10px 24px",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}} placeholder="Search parcel, address, listing #..."
          style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:12,fontFamily:"'DM Mono',monospace",outline:"none",width:220,background:"#fafafa"}}/>
        <select value={zoneFilter} onChange={e=>{setZoneFilter(e.target.value);setPage(0);}}
          style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:12,fontFamily:"'DM Mono',monospace",background:"#fafafa",cursor:"pointer",outline:"none"}}>
          {zones.map(z=><option key={z} value={z}>{z==="All"?"All Zones":`📍 ${z}`}</option>)}
        </select>
        <select value={cduFilter} onChange={e=>{setCduFilter(e.target.value);setPage(0);}}
          style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:12,fontFamily:"'DM Mono',monospace",background:"#fafafa",cursor:"pointer",outline:"none"}}>
          <option value="All">All CDU</option>
          {CDU_ORDER.map(c=><option key={c} value={c}>{c} — {CDU_CONFIG[c].full}</option>)}
        </select>
        {["All","Mismatches","Perfect"].map(t=>(
          <button key={t} onClick={()=>{setTypeFilter(t);setPage(0);}} style={{padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:700,fontFamily:"'DM Mono',monospace",cursor:"pointer",border:"1.5px solid",borderColor:typeFilter===t?"#2563eb":"#d1d5db",background:typeFilter===t?"#dbeafe":"#fafafa",color:typeFilter===t?"#1d4ed8":"#6b7280",transition:"all 0.15s"}}>
            {t==="Mismatches"?"⚠ Mismatches":t==="Perfect"?"✓ Perfect":"All Types"}
          </button>
        ))}
        <select value={statusFilter} onChange={e=>{setStatusFilter(e.target.value);setPage(0);}}
          style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:12,fontFamily:"'DM Mono',monospace",background:"#fafafa",cursor:"pointer",outline:"none"}}>
          {["All","Unreviewed",...STATUSES].map(s=><option key={s}>{s}</option>)}
        </select>
        <span style={{marginLeft:"auto",fontSize:11,color:"#6b7280",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>
          {filtered.length} parcels · page {page+1}/{Math.max(1,totalPages)}
        </span>
      </div>

      {/* Cards */}
      <div style={{padding:"20px 24px",maxWidth:1400,margin:"0 auto"}}>
        {paginated.length===0?(
          <div style={{textAlign:"center",padding:"60px 20px",color:"#9ca3af"}}>
            <div style={{fontSize:32,marginBottom:12}}>🔍</div>
            <div style={{fontSize:14,fontFamily:"'DM Mono',monospace"}}>No parcels match your filters</div>
          </div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"1fr",gap:18,maxWidth:860,margin:"0 auto"}}>
            {paginated.map(p=>{
              const photoKey = String(p.parcelId).replace(/-1$/,"");
              const photoDataUrl = portalPhotos.get(photoKey) || portalPhotos.get(String(p.parcelId)) || null;
              return <PropertyCard key={p.parcelId} parcel={p} status={statuses[p.parcelId]||null} onStatus={setStatus} windowId={portalWId} photoDataUrl={photoDataUrl}/>;
            })}
          </div>
        )}
        {totalPages>1&&(
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,marginTop:32,paddingBottom:32}}>
            <button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={{padding:"7px 16px",borderRadius:8,border:"1.5px solid #d1d5db",background:page===0?"#f9fafb":"#fff",cursor:page===0?"not-allowed":"pointer",color:page===0?"#9ca3af":"#374151",fontFamily:"'DM Mono',monospace",fontSize:12}}>← Prev</button>
            {Array.from({length:Math.min(totalPages,7)},(_,i)=>{
              const pNum=totalPages<=7?i:Math.max(0,Math.min(page-3,totalPages-7))+i;
              return <button key={pNum} onClick={()=>setPage(pNum)} style={{padding:"7px 12px",borderRadius:8,border:"1.5px solid",borderColor:page===pNum?"#2563eb":"#d1d5db",background:page===pNum?"#dbeafe":"#fff",color:page===pNum?"#1d4ed8":"#374151",fontFamily:"'DM Mono',monospace",fontSize:12,cursor:"pointer"}}>{pNum+1}</button>;
            })}
            <button disabled={page===totalPages-1} onClick={()=>setPage(p=>p+1)} style={{padding:"7px 16px",borderRadius:8,border:"1.5px solid #d1d5db",background:page===totalPages-1?"#f9fafb":"#fff",cursor:page===totalPages-1?"not-allowed":"pointer",color:page===totalPages-1?"#9ca3af":"#374151",fontFamily:"'DM Mono',monospace",fontSize:12}}>Next →</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Root with API Key Provider ──────────────────────────────────────────────
function Root() {
  // API key can be pre-baked by build_portal.py into window.PRELOADED_API_KEY
  const prebakedKey = (window.PRELOADED_API_KEY || '').trim();
  const [apiKey, setApiKey] = React.useState(prebakedKey);
  const [keyInput, setKeyInput] = React.useState('');
  const [showKeyPanel, setShowKeyPanel] = React.useState(false);
  const [keySaved, setKeySaved] = React.useState(false);

  const saveKey = () => {
    setApiKey(keyInput.trim());
    setKeySaved(true);
    setShowKeyPanel(false);
    setTimeout(() => setKeySaved(false), 3000);
  };

  return (
    <ApiKeyContext.Provider value={apiKey}>
      {/* Floating key button */}
      <div style={{position:'fixed',bottom:16,right:16,zIndex:9999,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
        {keySaved && (
          <div style={{background:'#065f46',color:'#d1fae5',padding:'6px 12px',borderRadius:8,fontSize:11,fontFamily:"'DM Mono',monospace",fontWeight:700,boxShadow:'0 2px 8px #0004'}}>
            ✓ API key saved
          </div>
        )}
        {showKeyPanel && (
          <div style={{background:'#1e293b',border:'1px solid #334155',borderRadius:12,padding:16,width:320,boxShadow:'0 8px 32px #0006'}}>
            <div style={{fontSize:11,color:'#7dd3fc',fontFamily:"'DM Mono',monospace",letterSpacing:'0.08em',marginBottom:8}}>ANTHROPIC API KEY</div>
            <div style={{fontSize:10,color:'#64748b',fontFamily:"'DM Mono',monospace",marginBottom:10,lineHeight:1.5}}>
              {prebakedKey
                ? <span style={{color:'#4ade80'}}>✓ Key pre-loaded by admin — AI suggestions are ready to use.</span>
                : <span>Set by office admin. Staff do not need to enter this.<br/>Key is stored in memory only — cleared on page refresh.</span>
              }
            </div>
            <input
              type="password"
              value={keyInput}
              onChange={e => setKeyInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && saveKey()}
              placeholder="sk-ant-..."
              style={{width:'100%',padding:'7px 10px',borderRadius:7,border:'1px solid #334155',background:'#0f172a',color:'#f8fafc',fontFamily:"'DM Mono',monospace",fontSize:12,outline:'none',marginBottom:8}}
            />
            <div style={{display:'flex',gap:8}}>
              <button onClick={saveKey}
                style={{flex:1,padding:'7px',borderRadius:7,border:'none',background:'#2563eb',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>
                Save Key
              </button>
              <button onClick={() => setShowKeyPanel(false)}
                style={{padding:'7px 12px',borderRadius:7,border:'1px solid #334155',background:'transparent',color:'#64748b',fontSize:11,cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>
                Cancel
              </button>
            </div>
          </div>
        )}
        <button onClick={() => setShowKeyPanel(k => !k)}
          title={apiKey ? (prebakedKey ? "AI ready — pre-loaded by admin" : "API key set — click to change") : "Set API key for AI suggestions"}
          style={{width:40,height:40,borderRadius:'50%',border:'none',background:apiKey?'#059669':'#334155',color:'#fff',fontSize:16,cursor:'pointer',boxShadow:'0 2px 8px #0004',display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.2s'}}>
          {apiKey ? '🔑' : '⚙️'}
        </button>
      </div>
      <App />
    </ApiKeyContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);

  </script>
</body>
</html>
