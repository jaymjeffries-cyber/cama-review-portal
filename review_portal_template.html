// ─── Parsers ──────────────────────────────────────────────────────────────────
function parseXlsx(buffer) {
  const wb = XLSX.read(buffer, { type:"array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws, { defval:"" });
}

function normalizeRow(row, fileType) {
  const parcelId    = String(row["Parcel_ID"] || row["PARID"] || "").trim();
  const address     = String(row["Address"]   || "").trim();
  const city        = String(row["City"]      || "").trim();
  const zip         = String(row["Zip"]       || row["Postal Code"] || "").trim();
  const zone        = String(row["Zone"] || row["TAXDIST"] || "").trim();
  const listing     = String(row["Listing_Number"] || row["Listing #"] || "").trim();
  const salekey     = String(row["SALEKEY"]   || "").trim();
  const addlParcels = String(row["ADDITIONAL_PARCELS"] || "").trim();
  const zillowUrl   = String(row["Zillow_URL"]  || "").trim();
  const parcelUrl   = String(row["Parcel_URL"]  || "").trim();
  const yrblt       = row["YRBLT"]    ? Number(row["YRBLT"])    : null;
  const effyr       = row["EFFYR"]    ? Number(row["EFFYR"])    : null;
  const grade       = String(row["GRADE"] || "").trim();
  const cdu         = String(row["CDU"]   || "").trim().toUpperCase();
  const remarks     = String(row["Public_Remarks"] || "").trim();
  // ── NEW fields ──
  const fixbath     = row["FIXBATH"] !== "" && row["FIXBATH"] != null ? Number(row["FIXBATH"]) : null;
  const fixhalf     = row["FIXHALF"] !== "" && row["FIXHALF"] != null ? Number(row["FIXHALF"]) : null;
  const sfla        = row["SFLA"]    !== "" && row["SFLA"]    != null ? Number(row["SFLA"])    : null;

  const base = { parcelId, address, city, zip, zone, listing, salekey, addlParcels,
                 zillowUrl, parcelUrl, yrblt, effyr, grade, cdu, remarks,
                 fixbath, fixhalf, sfla };

  if (fileType === "mismatches") {
    return { ...base, type:"mismatch",
      fieldMls:   String(row["Field_MLS"]  || ""),
      fieldCama:  String(row["Field_CAMA"] || ""),
      mlsValue:   row["MLS_Value"]  ?? "",
      camaValue:  row["CAMA_Value"] ?? "",
      difference: String(row["Difference"] || ""),
    };
  }
  return { ...base, type:"perfect",
    fieldsCompared: String(row["Fields_Compared"] || ""),
    fieldsList:     String(row["Fields_List"] || ""),
  };
}

function groupByParcel(rows) {
  const map = new Map();
  for (const r of rows) {
    if (!map.has(r.parcelId)) map.set(r.parcelId, { ...r, mismatches:[] });
    if (r.type === "mismatch") {
      map.get(r.parcelId).mismatches.push({
        fieldMls:r.fieldMls, fieldCama:r.fieldCama,
        mlsValue:r.mlsValue, camaValue:r.camaValue, difference:r.difference,
      });
    }
  }
  return Array.from(map.values());
}

function buildZillowUrl(address, city, zip) {
  if (!address || !city) return "";
  const clean = s => s.trim().replace(/[^\w\s-]/g,"").replace(/\s+/g,"-");
  const zipClean = String(zip||"").split("-")[0].trim();
  return `https://www.zillow.com/homes/${clean(address)}-${clean(city)}-OH${zipClean?`-${zipClean}`:""}_rb/`;
}

// ─── Extract parcel ID from photo filename (e.g. "102774-1.jpg" → "102774") ──
function photoKeyFromFilename(name) {
  const base = name.replace(/\.[^.]+$/, ""); // strip extension
  const match = base.match(/^(\d+)/);
  return match ? match[1] : base;
}

function LinkButton({ href, icon, label, accentColor, windowName, onIntercept }) {
  const isValid = href && href!=="nan" && href.trim()!=="" && href.startsWith("http");
  const base = {display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:8,fontSize:14,fontWeight:700,fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s",whiteSpace:"nowrap"};
  if (!isValid) return <span style={{...base,border:"1px solid #e5e7eb",background:"#f9fafb",color:"#d1d5db",cursor:"not-allowed",userSelect:"none"}}>{icon} {label}</span>;
  const handleClick = (e) => {
    e.preventDefault();
    if (onIntercept) { onIntercept(e); return; }
    // Chrome requires explicit width/height to open a true new window (not a tab)
    // Same windowName = reuses that window each click — perfect for dedicated monitors
    const features = 'width=1400,height=900,left=100,top=50,toolbar=yes,menubar=yes,scrollbars=yes,resizable=yes,location=yes,status=yes';
    window.open(href, windowName || label, features);
  };
  return (
    <a href={href} onClick={handleClick}
      style={{...base,border:`1.5px solid ${accentColor}44`,background:`${accentColor}0d`,color:accentColor,textDecoration:"none",cursor:"pointer"}}
      onMouseEnter={e=>{e.currentTarget.style.background=`${accentColor}22`;e.currentTarget.style.borderColor=accentColor;}}
      onMouseLeave={e=>{e.currentTarget.style.background=`${accentColor}0d`;e.currentTarget.style.borderColor=`${accentColor}44`;}}
    >{icon} {label}</a>
  );
}

- "Opportunity / potential / investor / as-is / TLC / fixer / elbow grease" → 48% change rate vs 41% baseline
- "opportunity" appeared in 43% of CDU downgrades — it is the single strongest downgrade word in Stark County data
- "investor" appeared in 17% of downgrades — 2.4x its baseline rate
- "as-is" appeared in 8% of downgrades — 4x its baseline rate
- Rule: Any soft negative language = lean toward FR unless photo contradicts

UPGRADE TRIGGERS (what actually drove CDU upgrades in this office):
- "remodeled" → 28% of all CDU upgrades (2x its baseline rate) — MEANINGFUL signal
- "move-in ready" → 28% of CDU upgrades (nearly 2x baseline) — meaningful when combined with photo evidence
- "renovated" → 23% of upgrades (3x baseline) — strong signal
- "new furnace" → 13% of upgrades (2x baseline) — systems upgrades matter
- "new windows" → 12% of upgrades (2.4x baseline) — meaningful
- "updated kitchen" → 15% of upgrades (2x baseline)
- "updated bath" → 12% of upgrades (2x baseline)
- "stainless" alone → 23% of upgrades but only 1.4x baseline — cosmetic, less meaningful alone
- "hardwood" alone → only 12% of upgrades but BELOW baseline rate — ignore as upgrade signal

YEAR BUILT PATTERNS (actual Stark County outcomes):
- CDU upgraded parcels:   median YRBLT 1941 — older homes CAN be upgraded if truly renovated
- CDU downgraded parcels: median YRBLT 1960
- CDU unchanged parcels:  median YRBLT 1960
- Age alone does not determine CDU — condition of upkeep does

LOCATION/SCHOOL FLUFF — IGNORE COMPLETELY:
- "Great location / award-winning schools / minutes from shopping / desirable / sought-after"
- These appeared in 45% of changed AND unchanged parcels equally — zero predictive value

function WindowIdModal({ pendingUrl, onConfirm, onCancel }) {
  const [val, setVal] = React.useState('');
  const tryExtract = (text) => {
    const t = text.trim();
    const m = t.match(/[?&]windowId=(\d+)/i);
    if (m) return m[1];
    if (/^\d{10,}$/.test(t)) return t;
    return null;
  };
  const handlePaste = (e) => {
    const pasted = (e.clipboardData || window.clipboardData).getData('text');
    const id = tryExtract(pasted);
    if (id) { e.preventDefault(); onConfirm(id, pendingUrl); }
  };
  const handleSubmit = () => { const id = tryExtract(val); if (id) onConfirm(id, pendingUrl); };
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:10000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'#1e293b',border:'1px solid #334155',borderRadius:14,padding:24,width:400,maxWidth:'90vw',boxShadow:'0 16px 48px rgba(0,0,0,0.6)'}}>
        <div style={{fontSize:12,fontWeight:700,color:'#7dd3fc',fontFamily:"'DM Mono',monospace",letterSpacing:'0.06em',marginBottom:8}}>{pendingUrl ? 'OPEN IN IASWORLD' : 'UPDATE IASWORLD WINDOW ID'}</div>
        <div style={{fontSize:12,color:'#94a3b8',marginBottom:14,lineHeight:1.6}}>
          {pendingUrl ? 'Paste your iasWorld URL below — the Window ID is extracted automatically and saved.' : 'Paste your iasWorld URL (or just the windowId number) to update the saved Window ID. The windowId changes each day when iasWorld is restarted.'}
        </div>
        <input autoFocus value={val} onChange={e=>setVal(e.target.value)} onPaste={handlePaste}
          placeholder="Ctrl+A, Ctrl+C from your iasWorld address bar, then paste here"
          style={{width:'100%',padding:'9px 10px',borderRadius:7,border:'1px solid #475569',background:'#0f172a',color:'#f8fafc',fontFamily:"'DM Mono',monospace",fontSize:11,outline:'none',boxSizing:'border-box',marginBottom:10}}/>
        <div style={{display:'flex',gap:8}}>
          <button onClick={handleSubmit} style={{flex:1,padding:'9px',borderRadius:7,border:'none',background:'#1d4ed8',color:'#fff',fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:700,cursor:'pointer'}}>{pendingUrl ? 'Open Parcel →' : 'Save Window ID'}</button>
          <button onClick={onCancel} style={{padding:'9px 14px',borderRadius:7,border:'1px solid #334155',background:'transparent',color:'#64748b',fontFamily:"'DM Mono',monospace",fontSize:12,cursor:'pointer'}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

        <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end",flexShrink:0}}>
          <LinkButton href={iasWorldUrl} icon="" label="iasWorld" accentColor="#1d4ed8" windowName="iasWorldWindow"
            onIntercept={!windowId ? ()=>{ onNeedWindowId && onNeedWindowId(iasWorldUrl); } : undefined}/>
          <LinkButton href={zillowUrl}   icon="" label="Zillow"   accentColor="#0ea5e9" windowName="zillowWindow"/>
        </div>
      </div>

      {/* -- Effective Age Panel -- */}
      <EffectiveAgePanel yrblt={parcel.yrblt} effyr={parcel.effyr} cdu={parcel.cdu} grade={parcel.grade}/>

      {/* -- AI Grade/Condition Panel -- */}
      <GradeSuggestPanel parcel={parcel} photoUrls={photoUrls}/>

      {/* -- Mismatch table -- */}
      {parcel.type==="mismatch" && parcel.mismatches.length>0 && (
        <div style={{marginBottom:8}}>
          <button onClick={()=>setExpanded(e=>!e)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#6b7280",fontFamily:"'DM Mono',monospace",padding:"4px 0",display:"flex",alignItems:"center",gap:4}}>
            {expanded?"":""} {expanded?"Hide":"Show"} field mismatches
          </button>
          {expanded && (
            <div style={{marginTop:6,borderRadius:8,overflow:"hidden",border:"1px solid #fca5a5"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",background:"#fef2f2",padding:"5px 10px",color:"#991b1b",fontWeight:700,fontSize:10,fontFamily:"'DM Mono',monospace",borderBottom:"1px solid #fca5a5"}}>
                <span>MLS FIELD</span><span>CAMA FIELD</span><span>MLS VALUE</span><span>CAMA VALUE</span>
              </div>
              {parcel.mismatches.map((m,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",padding:"6px 10px",background:i%2===0?"#fff":"#fff8f8",borderBottom:i<parcel.mismatches.length-1?"1px solid #fee2e2":"none",fontFamily:"'DM Mono',monospace",fontSize:13}}>
                  <span style={{color:"#b45309"}}>{m.fieldMls}</span>
                  <span style={{color:"#6b7280"}}>{m.fieldCama}</span>
                  <span style={{fontWeight:700,color:"#374151"}}>{String(m.mlsValue)}</span>
                  <span style={{color:"#dc2626",fontWeight:700}}>{String(m.camaValue)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* -- Perfect match fields -- */}
      {parcel.type==="perfect" && parcel.fieldsList && (
        <div style={{fontSize:11,color:"#4b5563",fontFamily:"'DM Mono',monospace",marginBottom:8}}>
          Fields matched: <span style={{color:"#059669"}}>{parcel.fieldsList}</span>
        </div>
      )}

      {/* -- Public Remarks -- */}
      {parcel.remarks && parcel.remarks!=="nan" && parcel.remarks!=="" && (
        <div style={{marginBottom:8}}>
          <button onClick={()=>setShowRemarks(r=>!r)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#6b7280",fontFamily:"'DM Mono',monospace",padding:"4px 0",display:"flex",alignItems:"center",gap:4}}>
            {showRemarks?"":""} {showRemarks?"Hide":"Show"} MLS remarks
          </button>
          {showRemarks && (
            <div style={{marginTop:6,padding:"10px 14px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,fontSize:14,color:"#374151",fontFamily:"'DM Sans',sans-serif",lineHeight:1.7,maxHeight:200,overflowY:"auto"}}>
              {parcel.remarks}
            </div>
          )}
        </div>
      )}

      {/* -- Status buttons -- */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
        {STATUSES.map(s=><StatusButton key={s} label={s} active={status===s} onClick={()=>{
          const next = status===s ? null : s;
          onStatus(parcel.parcelId, next, next==="Field Visit"?noteInput:"", parcel.address, parcel.zone);
          if (next==="Field Visit") setExpanded(true);
        }}/>)}
      </div>

      {/* -- Field Visit note panel -- */}
      {status==="Field Visit" && !isPastWeek && (
        <div style={{marginTop:10,padding:"10px 12px",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8}}>
          <div style={{fontSize:11,fontWeight:700,color:"#1e40af",fontFamily:"'DM Mono',monospace",letterSpacing:"0.06em",marginBottom:7}}>FIELD VISIT REASON</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
            {["New Addition","New Outbuilding","No Photos","Interior Changes","Other"].map(chip=>(
              <button key={chip} onClick={()=>{
                const val = noteInput===chip ? "" : chip;
                setNoteInput(val);
                onNote && onNote(parcel.parcelId, val, parcel.address, parcel.zone);
              }} style={{padding:"4px 10px",borderRadius:99,border:"1.5px solid",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Mono',monospace",transition:"all 0.12s",
                borderColor: noteInput===chip?"#2563eb":"#bfdbfe",
                background:  noteInput===chip?"#2563eb":"#fff",
                color:       noteInput===chip?"#fff":"#1e40af"}}>
                {chip}
              </button>
            ))}
          </div>
          <input value={noteInput} onChange={e=>{
              setNoteInput(e.target.value);
              onNote && onNote(parcel.parcelId, e.target.value, parcel.address, parcel.zone);
            }}
            placeholder="Add custom note..."
            style={{width:"100%",padding:"6px 10px",borderRadius:6,border:"1px solid #bfdbfe",background:"#fff",fontFamily:"'DM Sans',sans-serif",fontSize:12,outline:"none",color:"#1e3a8a",boxSizing:"border-box"}}/>
          {noteInput && <div style={{fontSize:10,color:"#3b82f6",marginTop:4,fontFamily:"'DM Mono',monospace"}}>✓ Note saved</div>}
        </div>
      )}
      {status==="Field Visit" && note && isPastWeek && (
        <div style={{marginTop:8,padding:"6px 10px",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,fontSize:12,color:"#1e40af",fontFamily:"'DM Sans',sans-serif"}}>
          <strong>Field Visit reason:</strong> {note}
        </div>
      )}
    </div>
    </div>
  );
}

  );

function PhotoFolderUpload({ photoMap, onPhotosLoaded }) {
  const ref = useRef();
  const [loading, setLoading] = useState(false);
  const count = photoMap.size;

  const handleFiles = useCallback(async (files) => {
    setLoading(true);
    const imageFiles = Array.from(files).filter(f => f.type.startsWith("image/"));
    const newMap = new Map();
    await Promise.all(imageFiles.map(file => new Promise(resolve => {
      const key = photoKeyFromFilename(file.name);
      const reader = new FileReader();
      reader.onload = e => { newMap.set(key, e.target.result); resolve(); };
      reader.readAsDataURL(file);
    })));
    onPhotosLoaded(newMap);
    setLoading(false);
  }, [onPhotosLoaded]);

  const handleDrop = useCallback(e => {
    e.preventDefault();
    const items = e.dataTransfer.items;
    const files = [];
    if (items) {
      for (const item of items) {
        const entry = item.webkitGetAsEntry && item.webkitGetAsEntry();
        if (entry && entry.isDirectory) {
          // folder dropped - read entries
          const reader = entry.createReader();
          reader.readEntries(entries => {
            entries.forEach(en => {
              if (en.isFile) en.file(f => { files.push(f); if(files.length===entries.length) handleFiles(files); });
            });
          });
          return;
        }
        if (item.kind==="file") files.push(item.getAsFile());
      }
    } else {
      for (const f of e.dataTransfer.files) files.push(f);
    }
    handleFiles(files);
  }, [handleFiles]);

  return (
    <div
      onDragOver={e=>e.preventDefault()}
      onDrop={handleDrop}
      onClick={()=>ref.current.click()}
      style={{border:`2px dashed ${count>0?"#7c3aed":"#d1d5db"}`,borderRadius:12,padding:"18px 16px",textAlign:"center",cursor:"pointer",transition:"all 0.2s",background:count>0?"#faf5ff":"#fafafa",minHeight:80,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}
    >
      <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}}
        onChange={e=>e.target.files.length&&handleFiles(e.target.files)}
      />
      <span style={{fontSize:22}}>{loading?"":count>0?"":""}</span>
      <span style={{fontSize:12,fontWeight:700,color:count>0?"#6d28d9":"#374151",fontFamily:"'DM Mono',monospace",letterSpacing:"0.03em"}}>
        {loading?"Loading photos...":"PHOTO FOLDER"}
      </span>
      {count>0
        ? <span style={{fontSize:11,color:"#7c3aed",fontFamily:"'DM Mono',monospace"}}>{count} photos loaded</span>
        : <span style={{fontSize:10,color:"#9ca3af",textAlign:"center",lineHeight:1.4}}>Select all photo files from your folder<br/>(e.g. 102774-1.jpg)</span>
      }
    </div>
  );
}

// --- Shared Backend Configuration ---
// Build script injects window.INJECTED_SHARED_API_URL and window.GITHUB_PAGES_BASE
var SHARED_API_URL    = (window.INJECTED_SHARED_API_URL || "");
var GITHUB_PAGES_BASE = (window.GITHUB_PAGES_BASE || "").replace(/\/$/,"");

function getReviewerEmail() {
  var email = sessionStorage.getItem("sc_reviewer_email");
  if (!email || !email.endsWith(".gov")) {
    var input = "";
    while (!input || !input.includes("@") || !input.endsWith(".gov")) {
      input = prompt(
        !input ? "Enter your .gov email to log review activity:"
               : "Must be a .gov email. Try again:",
        input || ""
      );
      if (input === null) { input = "unknown@unknown.gov"; break; }
      input = input.trim().toLowerCase();
    }
    sessionStorage.setItem("sc_reviewer_email", input);
    email = input;
  }
  return email;
}

function apiGetStatuses(weekKey) {
  if (!SHARED_API_URL) return Promise.resolve({ statuses: {}, notes: {} });
  return fetch(SHARED_API_URL + "?weekKey=" + encodeURIComponent(weekKey))
    .then(function(r) { return r.json(); })
    .then(function(d) { return { statuses: d.statuses || {}, notes: d.notes || {} }; })
    .catch(function() { return { statuses: {}, notes: {} }; });
}

function apiGetAllWeeks() {
  if (!SHARED_API_URL) return Promise.resolve({});
  return fetch(SHARED_API_URL + "?allWeeks=true")
    .then(function(r) { return r.json(); })
    .then(function(d) { return d.weeks || {}; })
    .catch(function() { return {}; });
}

function apiSetStatus(weekKey, parcelId, status, reviewer, note, address, zone) {
  if (!SHARED_API_URL) return;
  fetch(SHARED_API_URL, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ weekKey, parcelId, status, reviewer,
                           note: note||"", address: address||"", zone: zone||"" })
  }).catch(function() {});
}

function apiNotifySupport(weekKey, weekLabel) {
  if (!SHARED_API_URL) return Promise.resolve({ ok: false, message: "No API URL" });
  return fetch(SHARED_API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "notify", weekKey, weekLabel })
  }).then(r => r.json()).catch(() => ({ ok: false, message: "Network error" }));
}

function loadArchive(weekKey) {
  if (!GITHUB_PAGES_BASE) return Promise.resolve(null);
  return fetch(GITHUB_PAGES_BASE + "/archive/" + weekKey + ".json")
    .then(function(r) { return r.ok ? r.json() : null; })
    .catch(function() { return null; });
}

// --- Week Session helpers -----------------------
// Sessions are stored as: { [weekKey]: { label, mismatches, perfects, statuses, windowId, createdAt } }
// weekKey = "YYYY-WNN" e.g. "2026-W10"

function getISOWeekKey(date = new Date()) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(week).padStart(2,"0")}`;
}

function weekKeyToLabel(key) {
  // "2026-W10" → "Week of Mar 2, 2026"
  const [year, w] = key.split("-W");
  const jan4 = new Date(Date.UTC(Number(year), 0, 4));
  const weekNum = Number(w);
  const dayOfWeek = jan4.getUTCDay() || 7;
  const monday = new Date(jan4);
  monday.setUTCDate(jan4.getUTCDate() - (dayOfWeek - 1) + (weekNum - 1) * 7);
  return `Week of ${monday.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",timeZone:"UTC"})}`;
}

  return (
    <div style={{width:"100%",maxWidth:600,marginBottom:14,background:"#1e293b",borderRadius:12,padding:"14px 16px",border:"1px solid #334155"}}>

          const s = sessions[key];

  );

// --- Main App -----------------------------------------------------------------
function App() {
  // -- Week sessions stored in memory ------------------------------------------
  // sessions: { [weekKey]: { label, mismatches, perfects, statuses, windowId, createdAt } }
  const [sessions,     setSessions]     = useState({});
  const [activeWeek,   setActiveWeek]   = useState(null); // weekKey of session being uploaded to

  // -- Current upload state (before saving into a session) -------------------
  const [mismatches,   setMismatches]   = useState([]);
  const [perfects,     setPerfects]     = useState([]);
  const [photoMap,     setPhotoMap]     = useState(new Map());
  const [windowId,     setWindowId]     = useState(() => localStorage.getItem('iasworld_window_id') || "");
  const [winIdModal,   setWinIdModal]   = useState({open:false, pendingUrl:""});
  const [notes,        setNotes]        = useState({});  // { parcelId: noteText }
  const [notifyModal,  setNotifyModal]  = useState({open:false, sending:false, sent:false});

  // -- Portal view state -----------------------------------------------------
  const [portalWeek,   setPortalWeek]   = useState(null); // which week is open in portal
  const [statuses,     setStatuses]     = useState({});
  const [portalPhotos, setPortalPhotos] = useState(new Map());
  const [portalParcelData, setPortalParcelData] = useState({ mismatches: [], perfects: [] });
  const [zoneFilter,   setZoneFilter]   = useState("All");
  const [cduFilter,    setCduFilter]    = useState("All");
  const [statusFilter, setStatusFilter] = useState("All");
  const [typeFilter,   setTypeFilter]   = useState("All");
  const [search,       setSearch]       = useState("");
  const [page,         setPage]         = useState(0);
  const [view,         setView]         = useState("home");
  const PAGE_SIZE = 15;

  // -- Derive current week key -----------------------------------------------
  const currentWeekKey = useMemo(() => getISOWeekKey(), []);

  useEffect(function() {
    apiGetAllWeeks().then(function(weeks) {
      if (!weeks || !Object.keys(weeks).length) return;
      setSessions(function(prev) {
        var merged = Object.assign({}, prev);
        Object.entries(weeks).forEach(function(entry) {
          var wk = entry[0], summary = entry[1];
          if (!merged[wk]) {
            merged[wk] = {
              mismatches: [], perfects: [], statuses: {},
              windowId: "638981240146803746",
              createdAt: weekKeyToLabel(wk),
              parcelCount: summary.total || 0,
              needsUpload: true
            };
          } else {
            // Never overwrite parcels already loaded from archive
            merged[wk].parcelCount = merged[wk].parcelCount || summary.total || 0;
            // Merge statuses without touching parcel data
          }
        });
        return merged;
      });
    });
  }, []);

  // -- When user opens portal for a week, load that session's statuses -------
  const openPortal = useCallback(function(weekKey) {
    var sess = sessions[weekKey];
    var isCurrentWeek = weekKey === currentWeekKey;
    setPortalWeek(weekKey);
    setPortalPhotos(isCurrentWeek ? photoMap : new Map());
    setView("portal");
    setPage(0);
    setStatuses((sess && sess.statuses) || {});
    // Set parcel data from session if available, else archive will fill it in below
    var hasParcels = sess && ((sess.mismatches||[]).length + (sess.perfects||[]).length) > 0;
    if (hasParcels) {
      setPortalParcelData({ mismatches: sess.mismatches || [], perfects: sess.perfects || [] });
    }
    apiGetStatuses(weekKey).then(function(resp) {
      if (Object.keys(resp.statuses).length > 0) {
        setStatuses(resp.statuses);
        setSessions(function(s) {
          var u = Object.assign({}, s);
          u[weekKey] = Object.assign({}, u[weekKey], { statuses: resp.statuses });
          return u;
        });
      }
      if (Object.keys(resp.notes).length > 0) setNotes(resp.notes);
    });
    if (!hasParcels) {
      loadArchive(weekKey).then(function(archive) {
        if (!archive) return;
        var normMM = (archive.mismatches || []).map(function(r){ return normalizeRow(r,"mismatch"); });
        var normPP = (archive.perfects   || []).map(function(r){ return normalizeRow(r,"perfect"); });
        setPortalParcelData({ mismatches: normMM, perfects: normPP });
        setSessions(function(s) {
          var u = Object.assign({}, s);
          u[weekKey] = Object.assign({}, u[weekKey], {
            mismatches: archive.mismatches || [],
            perfects:   archive.perfects   || [],
            totalParcels: archive.totalParcels || null,  // Authoritative count from archive
            needsUpload: false
          });
          return u;
        });
      });
    }
  }, [sessions, photoMap, currentWeekKey]);

  // -- Save status changes back into the session -----------------------------
  const setStatus = useCallback(function(parcelId, status, note, address, zone) {
    var reviewer = getReviewerEmail();
    setStatuses(function(prev) {
      var next = Object.assign({}, prev);
      if (status === null) { delete next[parcelId]; }
      else { next[parcelId] = status; }
      if (portalWeek) {
        setSessions(function(s) {
          var u = Object.assign({}, s);
          u[portalWeek] = Object.assign({}, u[portalWeek], { statuses: next });
          return u;
        });
        apiSetStatus(portalWeek, parcelId, status, reviewer, note||"", address||"", zone||"");
      }
      return next;
    });
  }, [portalWeek]);

  // -- Save field visit note independently ----------------------------------
  const setNote = useCallback(function(parcelId, note, address, zone) {
    var reviewer = getReviewerEmail();
    setNotes(function(prev) { return Object.assign({}, prev, { [parcelId]: note }); });
    if (portalWeek) {
      apiSetStatus(portalWeek, parcelId, "Field Visit", reviewer, note, address||"", zone||"");
    }
  }, [portalWeek]);

  // -- Save session when user clicks "Open Review Portal" -------------------
  const saveAndOpenPortal = useCallback(function() {
    var weekKey = currentWeekKey;
    var now = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    var existingStatuses = (sessions[weekKey] && sessions[weekKey].statuses) || {};
    var sess = {
      mismatches: mismatches, perfects: perfects,
      statuses: existingStatuses, windowId: windowId,
      createdAt: now, parcelCount: mismatches.length + perfects.length,
      totalParcels: mismatches.length + perfects.length,  // Authoritative count for current week
      needsUpload: false
    };
    setSessions(function(s) { var u=Object.assign({},s); u[weekKey]=sess; return u; });
    setActiveWeek(weekKey);
    setStatuses(existingStatuses);
    setPortalParcelData({ mismatches: mismatches, perfects: perfects });
    setPortalWeek(weekKey);
    setPortalPhotos(photoMap);
    setView("portal");
    setPage(0);
    apiGetStatuses(weekKey).then(function(resp) {
      if (Object.keys(resp.statuses).length > 0) {
        setStatuses(resp.statuses);
        setSessions(function(s) {
          var u=Object.assign({},s);
          u[weekKey]=Object.assign({},u[weekKey],{statuses:resp.statuses});
          return u;
        });
      }
      if (Object.keys(resp.notes).length > 0) setNotes(resp.notes);
    });
  }, [currentWeekKey, mismatches, perfects, sessions, windowId, photoMap]);
  // -- Start a new blank week ------------------------------------------------
  const startNewWeek = useCallback(() => {
    setMismatches([]);
    setPerfects([]);
    setPhotoMap(new Map());
    setActiveWeek(null);
  }, []);

  const loadFile = useCallback((file, fileType, setter) => {
    const reader = new FileReader();
    reader.onload = e => { setter(groupByParcel(parseXlsx(new Uint8Array(e.target.result)).map(r=>normalizeRow(r,fileType)))); };
    reader.readAsArrayBuffer(file);
  }, []);

  // -- Portal data comes from the open session -------------------------------
  const portalSession = portalWeek ? sessions[portalWeek] : null;
  const portalMismatches = portalParcelData.mismatches || [];
  const portalPerfects   = portalParcelData.perfects   || [];

  var isPastWeek   = portalWeek && portalWeek !== currentWeekKey;
  var currentSess  = sessions[portalWeek] || {};
  var archiveEmpty = isPastWeek
    && (currentSess.mismatches||[]).length === 0
    && (currentSess.perfects||[]).length   === 0;

  const allParcels = useMemo(() => {
    const map = new Map();
    for (const p of portalPerfects)   map.set(p.parcelId, p);
    for (const p of portalMismatches) map.set(p.parcelId, p);
    return Array.from(map.values());
  }, [portalMismatches, portalPerfects]);

  // home-screen parcel count (current upload)
  const allParcelsHome = useMemo(() => {
    const map = new Map();
    for (const p of perfects)   map.set(p.parcelId, p);
    for (const p of mismatches) map.set(p.parcelId, p);
    return Array.from(map.values());
  }, [mismatches, perfects]);

  const zones = useMemo(() => {
    const seen = new Set();
    for (const p of allParcels) if (p.zone && p.zone!=="nan" && p.zone!=="") seen.add(p.zone);
    return ["All", ...Array.from(seen).sort()];
  }, [allParcels]);

  const filtered = useMemo(() => {
    let arr = allParcels;
    if (zoneFilter!=="All")          arr = arr.filter(p=>p.zone===zoneFilter);
    if (cduFilter!=="All")           arr = arr.filter(p=>p.cdu===cduFilter);
    if (typeFilter!=="All")          arr = arr.filter(p=>typeFilter==="Mismatches"?p.type==="mismatch":p.type==="perfect");
    if (statusFilter==="Unreviewed") arr = arr.filter(p=>!statuses[p.parcelId]);
    else if (statusFilter!=="All")   arr = arr.filter(p=>statuses[p.parcelId]===statusFilter);
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      arr = arr.filter(p=>p.parcelId.toLowerCase().includes(q)||p.address.toLowerCase().includes(q)||p.listing.toLowerCase().includes(q));
    }
    return arr;
  }, [allParcels, zoneFilter, cduFilter, typeFilter, statusFilter, search, statuses]);

  const paginated  = useMemo(()=>filtered.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE),[filtered,page]);
  const totalPages = Math.ceil(filtered.length/PAGE_SIZE);

  const exportXlsx = useCallback(() => {
    const rows = allParcels.map(p => {
      const suggestions = getAllCduSuggestions(p.yrblt) || {};
      return {
        Parcel_ID:p.parcelId, Address:p.address, City:p.city, Zone:p.zone,
        Listing_Number:p.listing, SALEKEY:p.salekey,
        YRBLT:p.yrblt, SFLA:p.sfla, FIXBATH:p.fixbath, FIXHALF:p.fixhalf,
        Current_EFFYR:p.effyr, GRADE:p.grade, CDU:p.cdu,
        Type:p.type==="mismatch"?"Mismatch":"Perfect",
        Mismatches:(p.mismatches ? p.mismatches.length : 0),
        Suggested_EFFYR:(suggestions[p.cdu] != null ? suggestions[p.cdu] : ""),
        Sugg_EX:suggestions["EX"]||"", Sugg_VG:suggestions["VG"]||"",
        Sugg_GD:suggestions["GD"]||"", Sugg_AV:suggestions["AV"]||"",
        Sugg_FR:suggestions["FR"]||"", Sugg_PR:suggestions["PR"]||"",
        Status:statuses[p.parcelId]||"",
      };
    });
    const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Review");
    XLSX.writeFile(wb,`review_status_${portalWeek||new Date().toISOString().slice(0,10)}.xlsx`);
  }, [allParcels, statuses, portalWeek]);

  const counts = useMemo(()=>({
    unreviewed: allParcels.length-Object.keys(statuses).length,
    reviewed:   Object.values(statuses).filter(s=>s==="Reviewed").length,
    fieldVisit: Object.values(statuses).filter(s=>s==="Field Visit").length,
  }),[allParcels,statuses]);

  // -- Read API key status from context ------------------------------------
  const currentApiKey = React.useContext(ApiKeyContext);
  const apiKeyReady = !!currentApiKey && currentApiKey.trim().length > 0;

  // -- Auto-load PRELOADED_DATA on mount ------------------------------------
  useEffect(() => {
    if (!PRELOADED) return;
    const mm = groupByParcel((PRELOADED.mismatchRows||[]).map(r=>normalizeRow(r,"mismatches")));
    const pm = groupByParcel((PRELOADED.perfectRows||[]).map(r=>normalizeRow(r,"perfect")));
    setMismatches(mm);
    setPerfects(pm);
    // Load photo map from pre-baked base64 strings
    if (PRELOADED.photoMap && Object.keys(PRELOADED.photoMap).length > 0) {
      setPhotoMap(new Map(Object.entries(PRELOADED.photoMap)));
    }
  }, []);

  // -- Hooks that must be before any early return ----------------------------
  const handleNeedWindowId = useCallback((pendingUrl) => {
    setWinIdModal({open:true, pendingUrl});
  }, []);
  const handleWindowIdConfirm = useCallback((id, pendingUrl) => {
    setWindowId(id);
    localStorage.setItem('iasworld_window_id', id);
    setWinIdModal({open:false, pendingUrl:""});
    if (pendingUrl) {
      const features = 'width=1400,height=900,left=100,top=50,toolbar=yes,menubar=yes,scrollbars=yes,resizable=yes,location=yes,status=yes';
      window.open(pendingUrl + '&windowId=' + id, 'iasWorldWindow', features);
    }
  }, []);

  // portalLabel / fieldVisitParcels / handleNotifySupport must also be before the early return
  const portalLabel = (portalSession && portalSession.createdAt) || weekKeyToLabel(portalWeek||currentWeekKey);
  const fieldVisitParcels = useMemo(() => allParcels.filter(p => statuses[p.parcelId]==="Field Visit"), [allParcels, statuses]);
  const handleNotifySupport = useCallback(() => {
    setNotifyModal({open:true, sending:true, sent:false});
    apiNotifySupport(portalWeek, (PRELOADED&&PRELOADED.weekLabel)||portalLabel)
      .then(() => setNotifyModal({open:false, sending:false, sent:true}))
      .catch(() => setNotifyModal({open:false, sending:false, sent:false}));
  }, [portalWeek, portalLabel]);

  // -- HOME ------------------------------------------------------------------
  if (view==="home") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%)",fontFamily:"'DM Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600;700&family=Syne:wght@700;800&display=swap');*{box-sizing:border-box;}`}</style>

      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:12,letterSpacing:"0.2em",color:"#7dd3fc",fontFamily:"'DM Mono',monospace",marginBottom:12,textTransform:"uppercase"}}>STARK COUNTY AUDITOR'S OFFICE  PROPERTY ASSESSMENT</div>
        <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:"clamp(28px,5vw,44px)",color:"#f8fafc",fontWeight:800,margin:0,letterSpacing:"-0.02em",lineHeight:1.1}}>
          MLS / CAMA<br/><span style={{color:"#38bdf8"}}>Staff Review Portal</span>
        </h1>
      </div>

      {/* Previous weeks */}
      {Object.keys(sessions).length > 0 && (
        <WeekSelectorPanel
          sessions={sessions}
          activeWeek={portalWeek}
          onSelect={wk => { openPortal(wk); }}
          onNewWeek={startNewWeek}
        />
      )}

      {/* Pre-loaded data banner OR new week upload label */}
      {PRELOADED && allParcelsHome.length > 0 ? (
        <div style={{width:"100%",maxWidth:600,marginBottom:10,background:"#052e16",border:"1px solid #166534",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,color:"#4ade80",fontFamily:"'DM Mono',monospace",fontWeight:700,letterSpacing:"0.06em",marginBottom:2}}>
               DATA PRE-LOADED BY ADMIN
            </div>
            <div style={{fontSize:10,color:"#166534",fontFamily:"'DM Mono',monospace"}}>
              {PRELOADED.weekLabel}  Generated {PRELOADED.generatedAt}
            </div>
          </div>
          <div style={{fontSize:10,color:"#4ade80",fontFamily:"'DM Mono',monospace",textAlign:"right"}}>
            {allParcelsHome.length} parcels<br/>
            {photoMap.size > 0 ? `${photoMap.size} photos` : "no photos"}
          </div>
        </div>
      ) : (
        <div style={{width:"100%",maxWidth:600,marginBottom:10}}>
          <div style={{fontSize:11,color:"#7dd3fc",fontFamily:"'DM Mono',monospace",letterSpacing:"0.08em",marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
            <span style={{background:"#2563eb",color:"#fff",borderRadius:4,padding:"1px 7px",fontWeight:700}}>NEW</span>
            {weekKeyToLabel(activeWeek || currentWeekKey).toUpperCase()}
            {activeWeek && sessions[activeWeek] && (
              <span style={{color:"#fbbf24",fontSize:10}}>(!) Re-uploading will keep existing review statuses</span>
            )}
          </div>
        </div>
      )}

      {/* Uploads: 3 columns - hidden when pre-loaded data is present */}
      {!PRELOADED && <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,width:"100%",maxWidth:600,marginBottom:20}}>
        {[["STEP 1","VALUE MISMATCHES","mismatches",setMismatches,mismatches.length],
          ["STEP 2","PERFECT MATCHES","perfect",setPerfects,perfects.length]].map(([step,label,type,setter,count])=>(
          <div key={step} style={{background:"#1e293b",borderRadius:14,padding:14,border:"1px solid #334155"}}>
            <div style={{fontSize:11,color:"#7dd3fc",fontFamily:"'DM Mono',monospace",marginBottom:8,letterSpacing:"0.08em"}}>{step}</div>
            <DropZone label={label} loaded={count>0} count={count} onFile={f=>loadFile(f,type,setter)}/>
          </div>
        ))}
        <div style={{background:"#1e293b",borderRadius:14,padding:14,border:"1px solid #334155"}}>
          <div style={{fontSize:11,color:"#a78bfa",fontFamily:"'DM Mono',monospace",marginBottom:8,letterSpacing:"0.08em"}}>STEP 3 <span style={{color:"#475569"}}>(optional)</span></div>
          <PhotoFolderUpload photoMap={photoMap} onPhotosLoaded={setPhotoMap}/>
        </div>
      </div>}

      {allParcelsHome.length>0&&(
        <div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center",marginBottom:20}}>
          {[["Total",allParcelsHome.length,"#38bdf8"],["Mismatches",mismatches.length,"#f87171"],["Perfect",perfects.length,"#4ade80"],["Photos",photoMap.size,"#a78bfa"]].map(([label,val,color])=>(
            <div key={label} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:99,padding:"7px 16px",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18,fontWeight:800,color,fontFamily:"'DM Mono',monospace"}}>{val}</span>
              <span style={{fontSize:11,color:"#94a3b8",letterSpacing:"0.04em"}}>{label.toUpperCase()}</span>
            </div>
          ))}
        </div>
      )}

      {/* API Key warning - shown when data is loaded but no key set */}
      {allParcelsHome.length > 0 && !apiKeyReady && (
        <div style={{width:"100%",maxWidth:600,marginBottom:14,background:"#1c1208",border:"2px solid #d97706",borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"flex-start",gap:12}}>
          <span style={{fontSize:24,flexShrink:0}}></span>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",fontFamily:"'DM Mono',monospace",letterSpacing:"0.06em",marginBottom:4}}>
              SET API KEY BEFORE ENTERING PORTAL
            </div>
            <div style={{fontSize:12,color:"#92400e",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6}}>
              AI Grade &amp; Condition suggestions will <strong style={{color:"#fbbf24"}}>not work</strong> once inside the portal unless you set the key here first.<br/>
              Click the <strong style={{color:"#fbbf24"}}> button</strong> in the bottom-right corner   paste your Anthropic API key   click Save Key.
            </div>
          </div>
        </div>
      )}
      {allParcelsHome.length > 0 && apiKeyReady && (
        <div style={{width:"100%",maxWidth:600,marginBottom:14,background:"#052e16",border:"1px solid #166534",borderRadius:10,padding:"10px 16px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}></span>
          <span style={{fontSize:12,color:"#4ade80",fontFamily:"'DM Mono',monospace",fontWeight:700}}> API KEY SET - AI suggestions ready</span>
        </div>
      )}

      <button disabled={allParcelsHome.length===0} onClick={saveAndOpenPortal}
        style={{background:allParcelsHome.length>0?"linear-gradient(135deg,#2563eb,#0ea5e9)":"#334155",color:allParcelsHome.length>0?"#fff":"#64748b",border:"none",borderRadius:12,padding:"14px 40px",fontSize:15,fontWeight:700,cursor:allParcelsHome.length>0?"pointer":"not-allowed",fontFamily:"'Syne',sans-serif",letterSpacing:"0.04em",boxShadow:allParcelsHome.length>0?"0 4px 20px #2563eb55":"none",transition:"all 0.2s"}}>
        {allParcelsHome.length>0?"Open Review Portal  ":"Upload files to continue"}
      </button>
    </div>
  );

  // -- PORTAL ----------------------------------------------------------------
  const portalWId = (portalSession && portalSession.windowId) || windowId;

  return (
    <React.Fragment>
    <div style={{minHeight:"100vh",background:"#f1f5f9",fontFamily:"'DM Sans',sans-serif"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600;700&family=Syne:wght@700;800&display=swap');*{box-sizing:border-box;}::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#f1f5f9;}::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px;}`}</style>

      {/* Top bar */}
      <div style={{background:"#0f172a",padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52,position:"sticky",top:0,zIndex:100,borderBottom:"1px solid #1e293b"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
          <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:"#7dd3fc",cursor:"pointer",fontSize:13,fontFamily:"'DM Mono',monospace",padding:"4px 8px",borderRadius:6,flexShrink:0}}> Back Back</button>
          <span style={{fontFamily:"'Syne',sans-serif",color:"#f8fafc",fontSize:14,fontWeight:800,letterSpacing:"-0.01em",whiteSpace:"nowrap"}}>MLS/CAMA Review</span>
          {/* Week switcher */}
          {Object.keys(sessions).length > 1 && (
            <select value={portalWeek||""} onChange={e=>{ if(e.target.value) { openPortal(e.target.value); setPage(0); } }}
              style={{padding:"3px 8px",borderRadius:6,border:"1px solid #334155",background:"#1e293b",color:"#7dd3fc",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer",outline:"none",maxWidth:180}}>
              {Object.keys(sessions).sort().reverse().map(k=>(
                <option key={k} value={k}>{weekKeyToLabel(k)}</option>
              ))}
            </select>
          )}
          {Object.keys(sessions).length === 1 && portalWeek && (
            <span style={{fontSize:11,color:"#38bdf8",fontFamily:"'DM Mono',monospace",background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"3px 8px"}}>{weekKeyToLabel(portalWeek)}</span>
          )}
          {portalPhotos.size>0&&<span style={{fontSize:10,background:"#7c3aed22",border:"1px solid #7c3aed66",color:"#a78bfa",borderRadius:4,padding:"2px 6px",fontFamily:"'DM Mono',monospace",fontWeight:700,flexShrink:0}}> {portalPhotos.size}</span>}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
          {[["UNR",counts.unreviewed,"#94a3b8","Unreviewed"],["REV",counts.reviewed,"#4ade80","Reviewed"],["FLD",counts.fieldVisit,"#60a5fa","Field Visit"]].map(([abbr,val,color,title])=>(
            <div key={abbr} title={title} style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:"#94a3b8",display:"flex",alignItems:"center",gap:2}}>
              <span style={{color,fontWeight:700,fontSize:13}}>{val}</span>
              <span style={{fontSize:9,color:"#475569"}}>{abbr}</span>
            </div>
          ))}
          <button onClick={exportXlsx} style={{marginLeft:4,background:"#1e293b",border:"1px solid #334155",color:"#7dd3fc",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'DM Mono',monospace",letterSpacing:"0.04em"}}> Export</button>
          {counts.fieldVisit > 0 && !isPastWeek && (
            <button onClick={()=>setNotifyModal({open:true,sending:false,sent:false})}
              style={{marginLeft:4,background:"#1e3a8a",border:"1px solid #3b82f6",color:"#93c5fd",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'DM Mono',monospace",letterSpacing:"0.04em",display:"flex",alignItems:"center",gap:5}}>
               Notify Support
              <span style={{background:"#2563eb",color:"#fff",borderRadius:99,padding:"1px 7px",fontSize:10,fontWeight:800}}>{counts.fieldVisit}</span>
            </button>
          )}
        </div>
      </div>

      {/* Filter bar */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"10px 24px",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}} placeholder="Search parcel, address, listing #..."
          style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:12,fontFamily:"'DM Mono',monospace",outline:"none",width:220,background:"#fafafa"}}/>
        <select value={zoneFilter} onChange={e=>{setZoneFilter(e.target.value);setPage(0);}}
          style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:12,fontFamily:"'DM Mono',monospace",background:"#fafafa",cursor:"pointer",outline:"none"}}>
          {zones.map(z=><option key={z} value={z}>{z==="All"?"All Zones":` ${z}`}</option>)}
        </select>
        <select value={cduFilter} onChange={e=>{setCduFilter(e.target.value);setPage(0);}}
          style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:12,fontFamily:"'DM Mono',monospace",background:"#fafafa",cursor:"pointer",outline:"none"}}>
          <option value="All">All CDU</option>
          {CDU_ORDER.map(c=><option key={c} value={c}>{c} - {CDU_CONFIG[c].full}</option>)}
        </select>
        {["All","Mismatches","Perfect"].map(t=>(
          <button key={t} onClick={()=>{setTypeFilter(t);setPage(0);}} style={{padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:700,fontFamily:"'DM Mono',monospace",cursor:"pointer",border:"1.5px solid",borderColor:typeFilter===t?"#2563eb":"#d1d5db",background:typeFilter===t?"#dbeafe":"#fafafa",color:typeFilter===t?"#1d4ed8":"#6b7280",transition:"all 0.15s"}}>
            {t==="Mismatches"?"(!) Mismatches":t==="Perfect"?" Perfect":"All Types"}
          </button>
        ))}
        <select value={statusFilter} onChange={e=>{setStatusFilter(e.target.value);setPage(0);}}
          style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:12,fontFamily:"'DM Mono',monospace",background:"#fafafa",cursor:"pointer",outline:"none"}}>
          {["All","Unreviewed",...STATUSES].map(s=><option key={s}>{s}</option>)}
        </select>
        <button onClick={()=>setWinIdModal({open:true,pendingUrl:""})}
          style={{marginLeft:"auto",padding:"5px 10px",borderRadius:8,border:"1.5px solid",borderColor:portalWId?"#334155":"#f59e0b",background:portalWId?"#f8fafc":"#fef3c7",color:portalWId?"#374151":"#92400e",fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}
          title="The iasWorld windowId changes daily — update it here">
          {portalWId ? `iasWorld ID: …${portalWId.slice(-6)}` : "⚠ Set iasWorld ID"}
        </button>
        <span style={{fontSize:11,color:"#6b7280",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>
          {filtered.length} parcels  page {page+1}/{Math.max(1,totalPages)}
        </span>
      </div>

      {/* Cards */}
      <div style={{padding:"20px 24px",maxWidth:1400,margin:"0 auto"}}>
        {archiveEmpty?(
          <div style={{textAlign:"center",padding:"60px 20px",color:"#9ca3af"}}>
            <div style={{fontSize:32,marginBottom:12}}>&#9203;</div>
            <div style={{fontSize:15,color:"#60a5fa",fontFamily:"'DM Mono',monospace",marginBottom:8}}>Loading past week data...</div>
            <div style={{fontSize:12,color:"#6b7280"}}>Fetching parcel cards from archive.</div>
          </div>
        ):paginated.length===0?(
          <div style={{textAlign:"center",padding:"60px 20px",color:"#9ca3af"}}>
            <div style={{fontSize:32,marginBottom:12}}>&#128269;</div>
            <div style={{fontSize:14,fontFamily:"'DM Mono',monospace"}}>No parcels match your filters</div>
          </div>
                ):(
          <div style={{display:"grid",gridTemplateColumns:"1fr",gap:18,maxWidth:860,margin:"0 auto"}}>
            {paginated.map(p=>{
              const pid = String(p.parcelId);
              const photoKey = pid.replace(/-1$/,"");
              const photoUrls = [portalPhotos.get(photoKey)||portalPhotos.get(pid),portalPhotos.get(pid+'-2'),portalPhotos.get(pid+'-3'),portalPhotos.get(pid+'-4')].filter(Boolean);
              return <PropertyCard key={p.parcelId} parcel={p} status={statuses[p.parcelId]||null} onStatus={setStatus} windowId={portalWId} photoUrls={photoUrls} isPastWeek={isPastWeek} onNeedWindowId={handleNeedWindowId} note={notes[p.parcelId]||""} onNote={setNote}/>;
            })}
          </div>
        )}
        {totalPages>1&&(
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,marginTop:32,paddingBottom:32}}>
            <button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={{padding:"7px 16px",borderRadius:8,border:"1.5px solid #d1d5db",background:page===0?"#f9fafb":"#fff",cursor:page===0?"not-allowed":"pointer",color:page===0?"#9ca3af":"#374151",fontFamily:"'DM Mono',monospace",fontSize:12}}> Back Prev</button>
            {Array.from({length:Math.min(totalPages,7)},(_,i)=>{
              const pNum=totalPages<=7?i:Math.max(0,Math.min(page-3,totalPages-7))+i;
              return <button key={pNum} onClick={()=>setPage(pNum)} style={{padding:"7px 12px",borderRadius:8,border:"1.5px solid",borderColor:page===pNum?"#2563eb":"#d1d5db",background:page===pNum?"#dbeafe":"#fff",color:page===pNum?"#1d4ed8":"#374151",fontFamily:"'DM Mono',monospace",fontSize:12,cursor:"pointer"}}>{pNum+1}</button>;
            })}
            <button disabled={page===totalPages-1} onClick={()=>setPage(p=>p+1)} style={{padding:"7px 16px",borderRadius:8,border:"1.5px solid #d1d5db",background:page===totalPages-1?"#f9fafb":"#fff",cursor:page===totalPages-1?"not-allowed":"pointer",color:page===totalPages-1?"#9ca3af":"#374151",fontFamily:"'DM Mono',monospace",fontSize:12}}>Next  </button>
          </div>
        )}
      </div>
    </div>
    {winIdModal.open && (
      <WindowIdModal
        pendingUrl={winIdModal.pendingUrl}
        onConfirm={handleWindowIdConfirm}
        onCancel={()=>setWinIdModal({open:false,pendingUrl:""})}
      />
    )}
    {notifyModal.open && (
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:10000,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{background:'#1e293b',border:'1px solid #334155',borderRadius:14,padding:24,width:520,maxWidth:'92vw',maxHeight:'80vh',display:'flex',flexDirection:'column',boxShadow:'0 16px 48px rgba(0,0,0,0.6)'}}>
          <div style={{fontSize:12,fontWeight:700,color:'#7dd3fc',fontFamily:"'DM Mono',monospace",letterSpacing:'0.06em',marginBottom:4}}>NOTIFY SUPPORT STAFF</div>
          <div style={{fontSize:12,color:'#94a3b8',marginBottom:14}}>The following parcels will be emailed to Stephanie and Jill based on zone.</div>
          <div style={{overflowY:'auto',flex:1,marginBottom:16}}>
            {fieldVisitParcels.map(p=>(
              <div key={p.parcelId} style={{padding:'10px 12px',marginBottom:6,background:'#0f172a',borderRadius:8,border:'1px solid #334155'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                  <div>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,color:'#f8fafc'}}>{p.parcelId}</span>
                    <span style={{fontSize:12,color:'#94a3b8',marginLeft:10}}>{p.address}</span>
                  </div>
                  <span style={{fontSize:11,background:'#1e3a8a',color:'#93c5fd',borderRadius:4,padding:'2px 8px',fontFamily:"'DM Mono',monospace",whiteSpace:'nowrap',flexShrink:0}}>{p.zone||'no zone'}</span>
                </div>
                {notes[p.parcelId] && <div style={{fontSize:11,color:'#60a5fa',marginTop:4,fontFamily:"'DM Sans',sans-serif"}}>Reason: {notes[p.parcelId]}</div>}
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={handleNotifySupport} disabled={notifyModal.sending}
              style={{flex:1,padding:'10px',borderRadius:7,border:'none',background:notifyModal.sending?'#334155':'#1d4ed8',color:notifyModal.sending?'#64748b':'#fff',fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:700,cursor:notifyModal.sending?'not-allowed':'pointer'}}>
              {notifyModal.sending ? 'Sending...' : `Send Email${fieldVisitParcels.length!==1?'s':''} →`}
            </button>
            <button onClick={()=>setNotifyModal({open:false,sending:false,sent:false})}
              style={{padding:'10px 16px',borderRadius:7,border:'1px solid #334155',background:'transparent',color:'#64748b',fontFamily:"'DM Mono',monospace",fontSize:12,cursor:'pointer'}}>
              Cancel
            </button>
          </div>
        </div>
      </div>
    )}
    {notifyModal.sent && (
      <div style={{position:'fixed',bottom:72,right:16,zIndex:9998,background:'#065f46',color:'#d1fae5',padding:'10px 16px',borderRadius:10,fontSize:12,fontFamily:"'DM Mono',monospace",fontWeight:700,boxShadow:'0 4px 12px rgba(0,0,0,0.3)'}}>
        ✓ Support staff notified
      </div>
    )}
    </React.Fragment>
  );
}

// --- Root with API Key Provider ----------------------------------------------
function Root() {
  // Load key from localStorage first, fall back to pre-baked value (never pushed to GitHub)
  const [apiKey, setApiKey] = React.useState(() => {
    return localStorage.getItem('anthropic_api_key') || (window.PRELOADED_API_KEY || '').trim();
  });
  const [keyInput, setKeyInput] = React.useState('');
  const [showKeyPanel, setShowKeyPanel] = React.useState(false);
  const [keySaved, setKeySaved] = React.useState(false);

  const saveKey = () => {
    const k = keyInput.trim();
    setApiKey(k);
    localStorage.setItem('anthropic_api_key', k);
    setKeySaved(true);
    setShowKeyPanel(false);
    setTimeout(() => setKeySaved(false), 3000);
  };

  return (
    <ApiKeyContext.Provider value={apiKey}>
      {/* Floating key button */}
      <div style={{position:'fixed',bottom:16,right:16,zIndex:9999,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
        {keySaved && (
          <div style={{background:'#065f46',color:'#d1fae5',padding:'6px 12px',borderRadius:8,fontSize:11,fontFamily:"'DM Mono',monospace",fontWeight:700,boxShadow:'0 2px 8px #0004'}}>
            ✓ API key saved
          </div>
        )}
        {showKeyPanel && (
          <div style={{background:'#1e293b',border:'1px solid #334155',borderRadius:12,padding:16,width:320,boxShadow:'0 8px 32px #0006'}}>
            <div style={{fontSize:11,color:'#7dd3fc',fontFamily:"'DM Mono',monospace",letterSpacing:'0.08em',marginBottom:8}}>ANTHROPIC API KEY</div>
            <div style={{fontSize:10,color:'#64748b',fontFamily:"'DM Mono',monospace",marginBottom:10,lineHeight:1.5}}>
              {apiKey
                ? <span style={{color:'#4ade80'}}>✓ Key saved in this browser — AI suggestions are ready.</span>
                : <span>Enter once — saved in your browser permanently.<br/>Never shared or sent anywhere except Anthropic.</span>
              }
            </div>
            <input
              type="password"
              value={keyInput}
              onChange={e => setKeyInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && saveKey()}
              placeholder="sk-ant-..."
              style={{width:'100%',padding:'7px 10px',borderRadius:7,border:'1px solid #334155',background:'#0f172a',color:'#f8fafc',fontFamily:"'DM Mono',monospace",fontSize:12,outline:'none',marginBottom:8}}
            />
            <div style={{display:'flex',gap:8}}>
              <button onClick={saveKey}
                style={{flex:1,padding:'7px',borderRadius:7,border:'none',background:'#2563eb',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>
                Save Key
              </button>
              <button onClick={() => setShowKeyPanel(false)}
                style={{padding:'7px 12px',borderRadius:7,border:'1px solid #334155',background:'transparent',color:'#64748b',fontSize:11,cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>
                Cancel
              </button>
            </div>
          </div>
        )}
        <button onClick={() => setShowKeyPanel(k => !k)}
          title={apiKey ? "API key set — click to change" : "Set API key for AI suggestions"}
          style={{width:40,height:40,borderRadius:'50%',border:'none',background:apiKey?'#059669':'#334155',color:'#fff',fontSize:16,cursor:'pointer',boxShadow:'0 2px 8px #0004',display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.2s'}}>
          {apiKey ? '🔑' : '🧠'}
        </button>
      </div>
      <App />
    </ApiKeyContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);

  </script>
</body>
</html>
